<!-- Sports Picks Enhancement -->
<div class="hot-streak-banner" id="hotStreak">
  <span class="flame">🔥</span>
  <span class="streak-text">Ken is on a <strong>3-game win streak</strong> in NBA!</span>
  <span class="flame">🔥</span>
</div>

<div class="sport-filters">
  <button class="filter-btn active" data-filter="all">📊 All</button>
  <button class="filter-btn" data-filter="nba">🏀 NBA</button>
  <button class="filter-btn" data-filter="nfl">🏈 NFL</button>
  <button class="filter-btn" data-filter="soccer">⚽ Soccer</button>
</div>

<div class="sports-calendar">
  <h4>📅 This Week</h4>
  <div class="calendar-grid">
    <div class="cal-day"><span class="day-name">Mon</span><span class="day-num">10</span><span class="pick-count">1</span></div>
    <div class="cal-day today"><span class="day-name">Tue</span><span class="day-num">11</span><span class="pick-count">3</span></div>
    <div class="cal-day has-pick"><span class="day-name">Wed</span><span class="day-num">12</span><span class="pick-count">2</span></div>
    <div class="cal-day"><span class="day-name">Thu</span><span class="day-num">13</span><span class="pick-count">1</span></div>
    <div class="cal-day has-pick"><span class="day-name">Fri</span><span class="day-num">14</span><span class="pick-count">2</span></div>
    <div class="cal-day"><span class="day-name">Sat</span><span class="day-num">15</span><span class="pick-count">-</span></div>
    <div class="cal-day has-pick"><span class="day-name">Sun</span><span class="day-num">16</span><span class="pick-count">1</span></div>
  </div>
</div>

<div class="parlay-card">
  <div class="parlay-header">
    <span class="parlay-icon">🎯</span>
    <span class="parlay-title">Ken's Parlay of the Week</span>
    <span class="parlay-odds">+450</span>
  </div>
  <div class="parlay-legs">
    <div class="parlay-leg"><span class="leg-check">○</span><span class="leg-text">Celtics -4.5 vs Lakers</span></div>
    <div class="parlay-leg"><span class="leg-check">○</span><span class="leg-text">Warriors vs Rockets Over 228.5</span></div>
    <div class="parlay-leg"><span class="leg-check">○</span><span class="leg-text">Man City Win vs Arsenal</span></div>
  </div>
  <div class="parlay-confidence">
    <span class="conf-label">Confidence:</span>
    <div class="conf-bar-container"><div class="conf-bar" style="width: 58%"></div></div>
    <span class="conf-value">58%</span>
  </div>
  <button class="btn-share-parlay" onclick="shareParlay()">🐦 Tweet this parlay</button>
</div>
